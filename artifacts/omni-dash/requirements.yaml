packages:
  "framer-motion": "For fluid M3 layout animations, dialogs, and interactions"
  "date-fns": "For formatting the top bar real-time clock widget"
  "lucide-react": "For crisp icons in the UI"
  "clsx": "For conditional tailwind classes"
  "tailwind-merge": "For merging tailwind classes safely"
  "uuid": "For generating unique IDs for custom sites"

images: []

notes:
  - "All state is client-side only and persisted to localStorage."
  - "No backend API calls are necessary."
  - "Them engine uses dynamic CSS variables based on a master hue slider to simulate Material You (M3) tonal palettes."
