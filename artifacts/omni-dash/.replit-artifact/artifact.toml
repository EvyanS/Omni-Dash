kind = "web"
previewPath = "/"
title = "Omni-Dash"
version = "1.0.0"
id = "artifacts/omni-dash"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21143

[services.development]
run = "pnpm --filter @workspace/omni-dash run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omni-dash", "run", "build" ]
publicDir = "artifacts/omni-dash/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21143"
BASE_PATH = "/"
